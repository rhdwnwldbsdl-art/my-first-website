<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요 👋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
    }
    h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 12px; }
    .subtitle { font-size: 16px; color: #667eea; font-weight: 600; margin-bottom: 20px; }
    p { color: #555; line-height: 1.7; font-size: 15px; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🙋</div>
    <h1>안녕하세요!</h1>
    <p class="subtitle">웹 개발을 배우고 있는 개발자입니다</p>
    <p>이 페이지는 GitHub Pages로 배포된 첫 번째 랜딩 페이지입니다.<br>앞으로 더 멋진 작품들로 찾아올게요 ✨</p>
    <a class="btn" href="https://github.com/rhdwnwldbsdl-art" target="_blank">GitHub 방문하기</a>
  </div>
</body>
</html>
